syntax = "proto3";

package pb;

option go_package = "github.com/ashok-shasmal/library-portal/internal/pb;pb";

import "google/protobuf/timestamp.proto";

message User {
  int32 id = 1;
  string name = 2;
  string email = 3;
  string password = 4; // password should not be sent in most responses; kept here for completeness
  double balance = 5;
  string role = 6;
  google.protobuf.Timestamp created_at = 7;
}

message BorrowRecord {
  int32 id = 1;
  int32 user_id = 2;
  int32 book_id = 3;
  google.protobuf.Timestamp borrowed_at = 4;
  google.protobuf.Timestamp due_date = 5;
  google.protobuf.Timestamp returned_at = 6;
  double rent_paid = 7;
}
