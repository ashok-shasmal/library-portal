syntax = "proto3";

package pb;

option go_package = "github.com/ashok-shasmal/library-portal/internal/pb;pb";

import "google/protobuf/timestamp.proto";

message Book {
  int32 id = 1;
  string title = 2;
  string author_name = 3;
  bool is_available = 4;
  double rent_price = 5;
  google.protobuf.Timestamp created_at = 6;
}
